name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run tests
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI_TEST: mongodb://localhost:27017/ratna-bakery-test
          JWT_SECRET: de638bfd6b81cc09e16f7647b661c12eae9f2b6d5f043485ef6c0e36903bdff328c8b4bd291ca37190229dd6ea8b602a0b706173a6b5770531261594eec000d4
          JWT_EXPIRES_IN: 7d
          MIDTRANS_SERVER_KEY: dummy
          MIDTRANS_CLIENT_KEY: dummy
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy
          CLIENT_URL: http://localhost:5173
        run: npm test

      - name: Check test coverage
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI_TEST: mongodb://localhost:27017/ratna-bakery-test
          JWT_SECRET: test_jwt_secret_for_ci_pipeline_only
          JWT_EXPIRES_IN: 7d
          MIDTRANS_SERVER_KEY: dummy
          MIDTRANS_CLIENT_KEY: dummy
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy
          CLIENT_URL: http://localhost:5173
        run: npx jest --coverage --forceExit
